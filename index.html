<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pink Productivity App</title>
    <link rel="stylesheet" href="styles/style.css" />
</head>

<body>

<div class="sidebar">
    <h2>🌸 My Space</h2>
    <button class="nav-btn" onclick="showPage('dashboard')">🏠 Dashboard</button>
    <button class="nav-btn" onclick="showPage('todo')">📝 To-do</button>
    <button class="nav-btn" onclick="showPage('journal')">📚 Journal</button>
    <button class="nav-btn" onclick="showPage('expenses')">💰 Expenses</button>

    <h3 style="margin-top: 30px; color: var(--accent); text-align: center;">Theme</h3>
    <button class="nav-btn" onclick="setTheme('')">Pink</button>
    <button class="nav-btn" onclick="setTheme('lavender')">Lavender</button>
    <button class="nav-btn" onclick="setTheme('cream')">Cream</button>
</div>

<div class="container">
    
    <!-- DASHBOARD -->
    <div id="dashboard" class="page show">
        <h1 style="color: var(--accent);">🌸 Daily Dashboard</h1>
        
        <div class="card">
            <h3 class="section-title">Today's Mood</h3>
            <p id="todayMood" style="color: #666; font-style: italic;">Tap mood in Diary page (Coming soon!)</p>
        </div>

        <div class="card">
            <h3 class="section-title">Weekly Mood Heatmap</h3>
            <div id="heatmap" class="heatmap"></div>
        </div>

        <div class="card">
            <h3 class="section-title">Today's Tasks</h3>
            <p id="todayTasks"></p>
        </div>

        <div class="card">
            <h3 class="section-title">Latest Journal Entry</h3>
            <p id="latestJournal"></p>
        </div>
    </div>

    <!-- TO DO PAGE -->
    <div id="todo" class="page">
        <h1 style="color: var(--accent);">📝 To-Do List</h1>
        <div class="card">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input id="taskInput" placeholder="Add new task..." style="flex:1;">
                <button class="nav-btn" style="width: auto; margin:0; padding: 12px 20px;" onclick="addTask()">Add</button>
            </div>
            
            <h3 style="color: var(--accent);">Pending Tasks</h3>
            <div id="taskList"></div>

            <h3 style="color: var(--accent); margin-top: 25px;">Completed Tasks</h3>
            <div id="completedList"></div>
        </div>
    </div>

    <!-- JOURNAL -->
    <div id="journal" class="page">
        <h1 style="color: var(--accent);">📖 Journal</h1>
        <div class="card" style="margin-bottom: 30px;">
            <textarea id="journalText" rows="6" placeholder="Write your thoughts for today..." style="width: 100%; box-sizing: border-box; margin-bottom: 15px; resize: vertical;"></textarea>
            <button class="nav-btn" style="width: 100%;" onclick="saveJournal()">📖 Save Entry</button>
        </div>
        
        <h3 style="color: var(--accent);">Past Entries</h3>
        <div id="journalEntries" style="display: flex; flex-direction: column-reverse; gap: 15px;"></div>
    </div>

    <!-- EXPENSES -->
    <div id="expenses" class="page">
        <h1 style="color: var(--accent);">💰 Expense Tracker</h1>
        <div class="card" style="margin-bottom: 30px;">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input id="expName" placeholder="What did you buy?" style="flex: 2;">
                <input id="expAmt" placeholder="₹ Amount" type="number" style="flex: 1;">
                <button class="nav-btn" style="width: auto; margin:0; padding: 12px 20px;" onclick="addExpense()">Add</button>
            </div>
        </div>
        <div class="card">
            <h3 style="color: var(--accent); margin-top: 0;">History</h3>
            <div id="expenseList"></div>
        </div>
    </div>

</div>

<script src="js/pages.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/todo.js"></script>
<script src="js/journal.js"></script>
<script src="js/expenses.js"></script>
<script src="js/theme.js"></script>

</body>
</html>
